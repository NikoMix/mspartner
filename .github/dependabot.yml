version: 2

updates:
  # Application dependencies (Next.js, React, TypeScript, tooling).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    # Let brand-new releases settle before opening PRs (stability over speed).
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
    # Batch low-risk updates to cut review/CI noise; majors stay individual.
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # ESLint 10 is incompatible with eslint-config-next@16 (its bundled
      # eslint-plugin-react calls the removed context.getFilename and crashes
      # `next lint`). Hold at the latest 9.x until eslint-config-next ships a
      # build that supports ESLint 10; minor/patch 9.x updates still flow.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  # Keep the Pages workflow's actions current and patched.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
