name: Deploy to GitHub Pages

# Build the static Next.js export and publish it to GitHub Pages on every push
# to the default branch, plus on demand via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write the Pages deployment, and request
# the OIDC token that actions/deploy-pages exchanges with GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deployments. Do not cancel an in-progress deploy — let it
# finish so a half-published site is never left live.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        env:
          # Inject the project-site sub-path (e.g. /mspartner) so all assets
          # resolve under https://<owner>.github.io/<repo>/.
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Disable Jekyll processing
        # Ensures the underscore-prefixed `_next/` directory is served verbatim.
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
